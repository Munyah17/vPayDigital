<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="ePay Smart — Premium virtual payment platform. Issue virtual cards, redeem vouchers, and manage your digital wallet." />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn, Telegram, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ePay Smart" />
    <meta property="og:url" content="https://epaysmart.live/" />
    <meta property="og:title" content="ePay Smart — Your Virtual Payments, Redefined" />
    <meta property="og:description" content="Issue virtual Visa, Mastercard & Amex cards, redeem vouchers, and manage your digital wallet — instant, affordable, and built for how you actually pay." />
    <meta property="og:image" content="https://epaysmart.live/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ePay Smart — Your Virtual Payments, Redefined" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ePay Smart — Your Virtual Payments, Redefined" />
    <meta name="twitter:description" content="Issue virtual Visa, Mastercard & Amex cards, redeem vouchers, and manage your digital wallet — instant, affordable, and built for how you actually pay." />
    <meta name="twitter:image" content="https://epaysmart.live/og-image.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ePay Smart" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>ePay Smart — Zimbabwe Payments</title>
    <!-- Apply persisted theme before paint to avoid a light/dark flash -->
    <script>
      (function () {
        try {
          var stored = JSON.parse(localStorage.getItem('vpay-theme'));
          if (stored && stored.state && stored.state.theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
